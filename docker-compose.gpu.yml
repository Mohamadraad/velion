name: velion-gpu

services:
  velion:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: velion:gpu
    container_name: velion-gpu
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - velion_models:/app/models
      - velion_uploads:/app/uploads
      - velion_exports:/app/exports
      - velion_recordings:/app/recordings
      - velion_data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    # ── USB camera access ──────────────────────────────────────────────
    # Gives the container access to ALL /dev/video* devices automatically.
    # Remove these two lines if you only use IP cameras (RTSP/HTTP).
    privileged: true
    group_add:
      - video

volumes:
  velion_models:
  velion_uploads:
  velion_exports:
  velion_recordings:
  velion_data: