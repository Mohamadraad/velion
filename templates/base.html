<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Velion — Intelligent Surveillance{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}" />
    <meta name="description" content="Velion is an intelligent surveillance platform that uses advanced computer vision to monitor live camera feeds and uploaded videos for real-time event detection, providing instant alerts for accident detection, theft prevention, construction safety, fall detection, and more." />
    <meta name="keywords" content="Velion, intelligent surveillance, computer vision, real-time monitoring, accident detection, theft prevention, construction safety, fall detection, video analysis, AI surveillance platform" />
    <meta name="author" content="Mohamad Raad" />
    <meta property="og:title" content="Velion — Intelligent Surveillance Platform" />
    <meta property="og:description" content="Velion is an intelligent surveillance platform that uses advanced computer vision to monitor live camera feeds and uploaded videos for real-time event detection, providing instant alerts for accident detection, theft prevention, construction safety, fall detection, and more." />
    <meta property="og:image" content="{{ url_for('static', filename='images/velion-og-image.png') }}" />
    <meta property="og:url" content="{{ url_for('index', _external=True) }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
    {% block extra_css %}{% endblock %}
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <!-- logo -->
            <div class="brand-icon" style="background:none;border:none;width:52px;height:52px;border-radius:0;">
                <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:52px;height:52px;">
                    <defs>
                        <linearGradient id="leftSlab" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#ff5050"/>
                            <stop offset="100%" stop-color="#e84545"/>
                        </linearGradient>
                        <linearGradient id="rightSlab" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#c73333"/>
                            <stop offset="100%" stop-color="#6a1515"/>
                        </linearGradient>
                        <linearGradient id="bezel" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#2a3347"/>
                            <stop offset="50%" stop-color="#1a2030"/>
                            <stop offset="100%" stop-color="#0f1420"/>
                        </linearGradient>
                        <clipPath id="lensClipBrand">
                            <circle cx="100" cy="100" r="76"/>
                        </clipPath>
                    </defs>
                    <circle cx="100" cy="100" r="94" fill="url(#bezel)"/>
                    <circle cx="100" cy="100" r="94" fill="none" stroke="#0d1118" stroke-width="1" stroke-dasharray="5 3"/>
                    <circle cx="100" cy="100" r="88" fill="#0b0e18"/>
                    <circle cx="100" cy="100" r="88" fill="none" stroke="#1e2838" stroke-width="1.2"/>
                    <circle cx="100" cy="100" r="82" fill="#090c15"/>
                    <circle cx="100" cy="100" r="82" fill="none" stroke="#141c2a" stroke-width="0.8"/>
                    <circle cx="100" cy="100" r="76" fill="#06080e"/>
                    <circle cx="100" cy="100" r="76" fill="none" stroke="#0e1520" stroke-width="0.8"/>
                    <circle cx="100" cy="100" r="68" fill="none" stroke="#0a1018" stroke-width="0.6"/>
                    <path d="M 46 58 A 70 70 0 0 1 88 28"
                        fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="8" stroke-linecap="round"/>
                    <polygon
                        points="54,53  80,53  102,147  76,147"
                        fill="url(#leftSlab)"
                        clip-path="url(#lensClipBrand)"/>
                    <polygon
                        points="146,53  120,53  98,147  124,147"
                        fill="url(#rightSlab)"
                        clip-path="url(#lensClipBrand)"/>
                    <polygon
                        points="76,147  102,147  100,153  78,153"
                        fill="#06080e"
                        clip-path="url(#lensClipBrand)"/>
                    <line x1="62" y1="61" x2="80" y2="137"
                        stroke="rgba(255,120,120,0.2)" stroke-width="1.5"
                        clip-path="url(#lensClipBrand)"/>
                </svg>
            </div>
            <!-- Title -->
            <div class="brand-text">
                <div style="display:flex;align-items:center;gap:8px;line-height:1;">
                    <span style="
                        font-family: 'Trebuchet MS', 'Century Gothic', Futura, sans-serif;
                        font-size: 1.25rem;
                        font-weight: 700;
                        letter-spacing: 0.18em;
                        background: linear-gradient(90deg, #ffffff 0%, #b0bcd4 100%);
                        -webkit-background-clip: text;
                        -webkit-text-fill-color: transparent;
                        background-clip: text;
                    ">VELION</span>
                    <span style="display:flex;flex-direction:column;gap:2px;padding-left:6px;border-left:1px solid #2a3347;">
                        <span style="
                            font-family: 'Trebuchet MS', 'Century Gothic', Futura, sans-serif;
                            font-size: 0.72rem;
                            font-weight: 700;
                            letter-spacing: 0.12em;
                            color: #e84545;
                            line-height: 1;
                        ">AI</span>
                        <span style="display:block;width:22px;height:1.5px;background:#e84545;opacity:0.55;border-radius:1px;"></span>
                    </span>
                </div>
                <span class="brand-sub" style="margin-top:5px;display:block;">Surveillance Platform</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="{{ url_for('index') }}" class="nav-item {% if request.endpoint == 'index' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
                <span>Overview</span>
            </a>
            <a href="{{ url_for('dashboard') }}" class="nav-item {% if request.endpoint == 'dashboard' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M3 12C3 12 7 5 12 5C17 5 21 12 21 12C21 12 17 19 12 19C7 19 3 12 3 12Z" stroke="currentColor" stroke-width="1.5"/></svg>
                <span>Monitor</span>
                <span class="nav-badge" id="stream-count">0</span>
            </a>
            <a href="{{ url_for('recordings_page') }}" class="nav-item {% if request.endpoint == 'recordings_page' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
                    <circle cx="12" cy="12" r="3" fill="currentColor"/>
                    <path d="M12 3V6M12 18V21M3 12H6M18 12H21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span>Recordings</span>
            </a>
            <a href="{{ url_for('upload') }}" class="nav-item {% if request.endpoint == 'upload' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none"><path d="M21 15V19C21 20.1046 20.1046 21 19 21H5C3.89543 21 3 20.1046 3 19V15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M17 8L12 3L7 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 3V15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                <span>Upload Video</span>
            </a>
            <a href="{{ url_for('models_page') }}" class="nav-item {% if request.endpoint == 'models_page' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none">
                    <circle cx="6" cy="12" r="2" stroke="currentColor" stroke-width="1.5"/>
                    <circle cx="12" cy="6" r="2" stroke="currentColor" stroke-width="1.5"/>
                    <circle cx="12" cy="18" r="2" stroke="currentColor" stroke-width="1.5"/>
                    <circle cx="18" cy="12" r="2" stroke="currentColor" stroke-width="1.5"/>

                    <line x1="8" y1="12" x2="10" y2="6.8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="8" y1="12" x2="10" y2="17.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="14" y1="6.8" x2="16" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="14" y1="17.2" x2="16" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span>Models</span>
            </a>
            <a href="{{ url_for('analytics') }}" class="nav-item {% if request.endpoint == 'analytics' %}active{% endif %}">
                <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="12" width="4" height="9" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="7" width="4" height="14" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="17" y="3" width="4" height="18" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
                <span>Analytics</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="system-status">
                <div class="status-dot" id="system-dot"></div>
                <span id="system-label">System Ready</span>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <button class="menu-toggle" id="menuToggle" aria-label="Toggle sidebar">
                <span></span><span></span><span></span>
            </button>
            <div class="topbar-title">{% block page_title %}Velion{% endblock %}</div>
            <div class="topbar-right">
                <div class="alert-bell" id="alertBell">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span class="bell-badge hidden" id="bellBadge">0</span>
                </div>
                <div class="time-display" id="timeDisplay"></div>
            </div>
        </header>

        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
