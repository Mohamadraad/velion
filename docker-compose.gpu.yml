name: velion-gpu

services:
  velion:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: velion:gpu
    container_name: velion-gpu
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # Persist user data outside the container
      - velion_models:/app/models
      - velion_uploads:/app/uploads
      - velion_exports:/app/exports
      - velion_recordings:/app/recordings
      - velion_data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1           # Use 1 GPU; set to "all" for multi-GPU hosts
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    # Allow USB cameras to be passed into the container
    # Uncomment and adjust device paths for your system:
    # devices:
    #   - /dev/video0:/dev/video0
    #   - /dev/video1:/dev/video1

volumes:
  velion_models:
  velion_uploads:
  velion_exports:
  velion_recordings:
  velion_data:
